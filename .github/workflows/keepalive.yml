name: Keep-alive Supabase

# Supabase free tier menjeda database setelah ±1 minggu idle.
# Cron ini memanggil /api/health (yang menjalankan `select 1`) tiap 2 hari
# supaya database selalu dianggap aktif — asuransi demo/penilaian.
#
# Setup sekali: repo Settings → Secrets and variables → Actions → Variables →
# tambah PROD_URL = https://<domain-vercel-kamu> (tanpa slash akhir).

on:
  schedule:
    - cron: "0 3 */2 * *" # tiap 2 hari, 03:00 UTC (10:00 WIB)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          if [ -z "${{ vars.PROD_URL }}" ]; then
            echo "::warning::Repository variable PROD_URL belum di-set — lewati ping."
            exit 0
          fi
          resp=$(curl -fsS "${{ vars.PROD_URL }}/api/health")
          echo "$resp"
          echo "$resp" | grep -q '"db":"ok"' || { echo "::error::Database tidak merespons"; exit 1; }
